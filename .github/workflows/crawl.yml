name: Crawl Jobs

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Run crawler
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JSEARCH_KEY: ${{ secrets.JSEARCH_KEY }}
        run: node crawler.js

      - name: Commit jobs.json
        run: |
          git config user.name "JobScout Bot"
          git config user.email "bot@jobscout.in"
          git add data/jobs.json data/meta.json
          git diff --staged --quiet || git commit -m "Update jobs $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
